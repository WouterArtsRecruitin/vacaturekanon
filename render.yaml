services:
  - type: web
    name: vacaturekanon-webhook
    runtime: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 webhooks.handler:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
