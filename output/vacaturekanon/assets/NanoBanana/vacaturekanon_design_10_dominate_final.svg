<svg width="100%" viewBox="0 0 680 570" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
  </defs>
  
  <!-- Background -->
  <rect width="680" height="560" fill="#1a1f2e" style="fill:rgb(26, 31, 46);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Burst circles (energy radiating) -->
  <circle cx="340" cy="280" r="0" fill="#FF8C00" opacity="0.3" style="fill:rgb(255, 140, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1.08549e-05;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
